services:
  naudea-pricing:
    build: .
    container_name: naudea_pricing_web
    ports:
      - "3000:3000"
    volumes:
      # Carpeta física en tu NAS mapeada al interior del contenedor
      - ${APPDATA_VOLUMEN}data:/app/data
    environment:
      # NextAuth domain setup
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}

      # SQLite DB mapping into the volume folder we exposed above
      - DATABASE_URL=${DATABASE_URL}

      # Your API configuration
      - GEMINI_API_KEY=${GEMINI_API_KEY}

    restart: unless-stopped
