version: '3.8'

services:
  naudea-pricing:
    build: .
    container_name: naudea_pricing_web
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      # NextAuth domain setup
      - NEXTAUTH_URL=http://<YOUR_NAS_IP>:3000
      - NEXTAUTH_SECRET=<REPLACE_THIS_SECRET>

      # SQLite DB mapping into the volume folder we exposed above
      - DATABASE_URL=file:/app/data/prod.db

      # Your API configuration
      - GEMINI_API_KEY=<REPLACE_THIS_WITH_AI_API_KEY>

    restart: unless-stopped
